<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Kampüs Aydınlatma Simülasyonu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f4f6f9; padding: 20px; }
        .card { border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .lamp-status { height: 100px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: white; transition: background-color 0.3s; }
        .lamp-off { background-color: #6c757d; }
        .lamp-on { background-color: #ffc107; color: black; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center mb-4">Akıllı Kampüs Aydınlatma İzleme Paneli</h2>

    <div class="row">
        <div class="col-md-4">
            <div class="card p-3">
                <h5 class="card-title text-center">İç Mekan (PIR Sensör)</h5>
                <div id="lampIndicator" class="lamp-status lamp-off mb-3">Lamba Kapalı</div>
                <button id="btnMotion" class="btn btn-primary w-100">Hareket Algıla (Simüle Et)</button>
                <p class="text-center mt-2 text-muted" id="timerText">Beklemede...</p>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card p-3">
                <h5 class="card-title text-center">Gün İçi Batarya Doluluk Seviyesi (%)</h5>
                <canvas id="batteryChart" height="100"></canvas>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-12">
            <div class="card p-3">
                <h5 class="card-title text-center">Enerji Tüketimi Karşılaştırması (Yıllık Tahmini kWh)</h5>
                <canvas id="energyChart" height="80"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
